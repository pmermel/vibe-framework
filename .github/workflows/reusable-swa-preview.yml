name: Reusable SWA Preview

on:
  workflow_call:
    inputs:
      app_name:
        type: string
        required: true
        description: Project name
      resource_group:
        type: string
        required: true
        description: Azure resource group containing the Static Web App
      swa_name:
        type: string
        required: true
        description: Azure Static Web App resource name (e.g. my-app-swa)
      install_command:
        type: string
        required: false
        default: npm install
        description: Dependency install command
      build_command:
        type: string
        required: false
        default: npm run build
        description: Application build command
      output_location:
        type: string
        required: false
        default: dist
        description: Build output directory relative to repo root

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  deploy:
    name: Build and Deploy Preview
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    environment: preview
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install dependencies
        run: ${{ inputs.install_command }}

      - name: Build
        run: ${{ inputs.build_command }}

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Fetch SWA deployment token
        id: get-token
        run: |
          TOKEN=$(az staticwebapp secrets list \
            --name ${{ inputs.swa_name }} \
            --resource-group ${{ inputs.resource_group }} \
            --query "properties.apiKey" -o tsv)
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Deploy Preview to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.get-token.outputs.token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: /
          output_location: ${{ inputs.output_location }}
          skip_app_build: true

  close:
    name: Close Preview Environment
    runs-on: ubuntu-latest
    if: github.event.action == 'closed'
    environment: preview
    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Fetch SWA deployment token
        id: get-token
        run: |
          TOKEN=$(az staticwebapp secrets list \
            --name ${{ inputs.swa_name }} \
            --resource-group ${{ inputs.resource_group }} \
            --query "properties.apiKey" -o tsv)
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Close Preview Environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.get-token.outputs.token }}
          action: close
